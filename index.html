<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Niro — Stable Multiworld System</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            transition: background 0.5s ease;
            background: #010111;
        }

        #minimap {
            position: fixed;
            bottom: 10px;
            right: 10px;

            width: 180px;
            height: 180px;

            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #8a4dff;
            border-radius: 8px;

            z-index: 100000;
        }

        /* =========================
   UI BUTTON
========================= */
        #followBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 2px solid #8a4dff;
            background: white;
            cursor: pointer;
            z-index: 100000;
        }

        /* =========================
   WORLDS
========================= */
        .world {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: none;
        }

        .world.active {
            display: block;
        }

        .world {
            perspective: 900px;
        }

        /* the "ground plane illusion" */
        .world::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            left: -50%;
            top: 40%;
            transform: rotateX(70deg);
            transform-origin: center;
            background: linear-gradient(to bottom,
                    rgba(80, 120, 255, 0.30),
                    rgba(0, 0, 0, 0.1));
            z-index: 0;
            pointer-events: none;
        }

        /* make objects sit above plane */
        .room,
        .npc {
            z-index: 2;
        }

        /* =========================
   NIRO
========================= */
        #niro {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;

            background: radial-gradient(circle at 30% 30%,
                    #c084ff,
                    #2a003f 55%,
                    #000 100%);

            box-shadow:
                0 0 25px rgba(138, 77, 255, 0.55),
                0 0 60px rgba(138, 77, 255, 0.2),
                inset 0 0 18px rgba(255, 255, 255, 0.08);

            z-index: 99999;
            pointer-events: none;

            animation: floatNiro 3s ease-in-out infinite;
        }

        /* aura ring */
        #niro::after {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(138, 77, 255, 0.35);
            animation: pulseRing 2.5s infinite;
        }

        /* face float */
        @keyframes floatNiro {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.2;
            }

            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        /* eyes (keep identity, add glow) */
        .eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 32px;

            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .eye.left {
            left: 24px;
        }

        .eye.right {
            right: 24px;
        }

        /* mouth (slight upgrade) */
        #mouth {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);

            width: 34px;
            height: 14px;
            border-bottom: 3px solid white;

            opacity: 0.9;
        }

        /* =========================
   ORIN
========================= */
        #orin {
            position: absolute;
            width: 85px;
            height: 85px;
            border-radius: 50%;

            background: radial-gradient(circle at 50% 40%,
                    #1c1c1c,
                    #000 70%);

            box-shadow:
                0 0 20px rgba(0, 0, 0, 0.8),
                0 0 35px rgba(255, 255, 255, 0.05);

            z-index: 99998;
            pointer-events: none;

            animation: floatOrin 4s ease-in-out infinite;
        }

        @keyframes floatOrin {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(3px);
            }
        }

        /* eye (single but more alive) */
        #orinEye {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #fff, #bbb);
            border-radius: 50%;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);

            box-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
        }

        /* mouth (subtle control line) */
        #orinMouth {
            position: absolute;
            bottom: 18px;
            left: 50%;
            width: 22px;
            height: 10px;

            transform: translateX(-50%);
            border-bottom: 2px solid rgba(255, 255, 255, 0.8);

            border-radius: 0 0 20px 20px;
        }

        /* follow button */
        #orinFollowBtn {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 34px;
            height: 34px;
            background: white;
            border: 2px solid black;
            border-radius: 8px;
            z-index: 100000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================
   ROOM
========================= */
        .room {
            position: absolute;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%;
        }

        /* =========================
   NPC
========================= */
        .npc {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .name {
            position: absolute;
            font-size: 10px;
            transform: translate(-50%, -18px);
            white-space: nowrap;
        }

        .speech {
            position: absolute;
            max-width: 180px;
            padding: 8px 10px;

            background: white;
            color: black;

            border-radius: 10px;
            font-size: 12px;

            z-index: 100000;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* =========================
   KABEL (HUMAN EYE)
========================= */

        #kabel {
            position: absolute;
            width: 90px;
            height: 60px;
            z-index: 99997;
            pointer-events: none;
        }

        /* eye shape */
        #kabelEye {
            width: 100%;
            height: 100%;

            position: relative;

            background: radial-gradient(circle at 50% 50%, #ffffff 60%, #cfe9ff 100%);
            border-radius: 50% / 60%;

            border: 2px solid rgba(0, 140, 255, 0.6);

            box-shadow:
                0 0 12px rgba(0, 140, 255, 0.25),
                inset 0 0 8px rgba(0, 80, 255, 0.15);

            overflow: hidden;
        }

        /* pupil */
        #kabelPupil {
            position: absolute;
            width: 50px;
            height: 40px;
            background: radial-gradient(circle, #3aa0ff, #001a40);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #kabelFollowBtn {
            position: fixed;
            bottom: 50px;
            left: 10px;
            width: 34px;
            height: 34px;
            background: white;
            border: 2px solid blue;
            border-radius: 8px;
            z-index: 100000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div id="followBtn">👁️</div>
    <div id="kabelFollowBtn">🔵</div>
    <canvas id="minimap"></canvas>
    <div id="w0" class="world active">

        <div id="niro">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div id="mouth"></div>
        </div>

        <div id="orin">
            <div id="orinEye"></div>
            <div id="orinMouth"></div>
        </div>

        <div id="kabel">
            <div id="kabelEye">
                <div id="kabelPupil"></div>

            </div>
        </div>

    </div>
    <script>
        /* =========================
   GLOBAL STATE
========================= */

        const WORLD_SIZE = 1200;

        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const r = (min, max) => Math.random() * (max - min) + min;

        /* =========================
           FOLLOW MODE
        ========================= */

        let followMode = "niro";

        /* =========================
           ENTITY POSITIONS
        ========================= */

        // NIRO
        let x = 500,
            y = 500;
        let tx = 600,
            ty = 600;

        // ORIN
        let ox = 450,
            oy = 450;
        let otx = 450,
            oty = 450;

        // KABEL
        let kx = 700,
            ky = 700;
        let ktx = 700,
            kty = 700;

        /* =========================
           CAMERA
        ========================= */

        let camX = 0,
            camY = 0,
            zoom = 1;
        let keys = {};

        const world = document.getElementById("w0");

        document.getElementById("followBtn").onclick = () => followMode = "niro";
        document.getElementById("kabelFollowBtn").onclick = () => followMode = "kabel";

        document.addEventListener("keydown", (e) => {
            const k = e.key.toLowerCase();
            keys[k] = true;

            if (k === "n") followMode = "niro";
            if (k === "k") followMode = "kabel";
            if (k === "o") followMode = "orin";
            if (k === "f") followMode = "free";
        });

        document.addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener("wheel", (e) => {
            zoom -= e.deltaY * 0.001;
            zoom = clamp(zoom, 0.35, 2);
        });

        /* =========================
           CAMERA LOOP (FIXED + SMOOTH)
        ========================= */

        function camera() {
            const speed = 8 / zoom;

            // FREE CAM
            if (followMode === "free") {
                if (keys["w"] || keys["arrowup"]) camY += speed;
                if (keys["s"] || keys["arrowdown"]) camY -= speed;
                if (keys["a"] || keys["arrowleft"]) camX += speed;
                if (keys["d"] || keys["arrowright"]) camX -= speed;
            }

            // FOLLOW NIRO
            if (followMode === "niro") {
                camX += ((window.innerWidth / 2 - x) - camX) * 0.12;
                camY += ((window.innerHeight / 2 - y) - camY) * 0.12;
            }

            // FOLLOW ORIN
            if (followMode === "orin") {
                camX += ((window.innerWidth / 2 - ox) - camX) * 0.12;
                camY += ((window.innerHeight / 2 - oy) - camY) * 0.12;
            }

            // FOLLOW KABEL
            if (followMode === "kabel") {
                camX += ((window.innerWidth / 2 - kx) - camX) * 0.12;
                camY += ((window.innerHeight / 2 - ky) - camY) * 0.12;
            }

            world.style.transform =
                `translate(${camX}px, ${camY}px) scale(${zoom})`;

            requestAnimationFrame(camera);
        }
        camera();

        /* =========================
           NIRO MOVEMENT
        ========================= */

        function moveNiro() {
            const el = document.getElementById("niro");

            x += (tx - x) * 0.04;
            y += (ty - y) * 0.04;

            if (Math.hypot(tx - x, ty - y) < 20) {
                tx = x + r(-350, 350);
                ty = y + r(-350, 350);
            }

            el.style.left = x + "px";
            el.style.top = y + "px";

            requestAnimationFrame(moveNiro);
        }

        /* =========================
           ORIN FOLLOW SYSTEM
        ========================= */

        function moveOrin() {
            const el = document.getElementById("orin");

            ox += (x - ox - 45) * 0.03;
            oy += (y - oy - 45) * 0.03;

            el.style.left = ox + "px";
            el.style.top = oy + "px";

            requestAnimationFrame(moveOrin);
        }

        /* =========================
           KABEL (EYE AI MOVEMENT)
        ========================= */

        function moveKabel() {
            const el = document.getElementById("kabel");
            const pupil = document.getElementById("kabelPupil");

            kx += (ktx - kx) * 0.05;
            ky += (kty - ky) * 0.05;

            if (Math.hypot(ktx - kx, kty - ky) < 25) {
                ktx = r(0, WORLD_SIZE);
                kty = r(0, WORLD_SIZE);
            }

            el.style.left = (kx - 45) + "px";
            el.style.top = (ky - 30) + "px";

            const dx = ktx - kx;
            const dy = kty - ky;
            const d = Math.hypot(dx, dy) || 1;

            pupil.style.transform =
                `translate(calc(-50% + ${(dx / d) * 9}px), calc(-50% + ${(dy / d) * 9}px))`;

            requestAnimationFrame(moveKabel);
        }

        /* =========================
           MINIMAP
        ========================= */

        const canvas = document.getElementById("minimap");
        const ctx = canvas.getContext("2d");

        canvas.width = 180;
        canvas.height = 180;

        function drawMinimap() {
            ctx.clearRect(0, 0, 180, 180);

            const sx = 180 / WORLD_SIZE;
            const sy = 180 / WORLD_SIZE;

            // NIRO
            ctx.fillStyle = "#a855f7";
            ctx.fillRect(x * sx, y * sy, 5, 5);

            // ORIN
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(ox * sx, oy * sy, 5, 5);

            // KABEL
            ctx.fillStyle = "#00b7ff";
            ctx.fillRect(kx * sx, ky * sy, 5, 5);

            requestAnimationFrame(drawMinimap);
        }

        /* =========================
           START SYSTEMS
        ========================= */

        moveNiro();
        moveOrin();
        moveKabel();
        drawMinimap();
        /* =========================
           NIRO AUTONOMOUS AI
        ========================= */

        const niroAI = {
            mood: 1.0, // 0–1 (chaotic vs calm)
            curiosity: 0.1,
            lastDecision: 0,
            decisionDelay: 600, // ms

            think() {
                const now = Date.now();

                if (now - this.lastDecision < this.decisionDelay) return;
                this.lastDecision = now;

                // mood drift
                this.mood += (Math.random() - 0.5) * 0.2;
                this.mood = clamp(this.mood, 0, 1);

                // 🔥 MUCH MORE ACTIVE
                const roll = Math.random();

                if (roll < 0.75) {
                    this.buildSomething();
                }
            },

            buildSomething() {

                const roll = Math.random();

                if (roll < 0.35) {
                    niroBuildRoom();
                } else if (roll < 0.75) {
                    // 🔥 LOT MORE NPCS
                    const count = 3 + Math.floor(Math.random() * 5);

                    for (let i = 0; i < count; i++) {
                        niroSpawnNPC();
                    }
                } else {
                    const count = 3 + Math.floor(Math.random() * 5);

                    for (let i = 0; i < count; i++) {
                        niroCreate();
                    }
                }
            }
        };

        function niroSpawnNPC() {

            const id = "npc_" + Date.now();

            const npc = {
                x: x + (Math.random() - 0.5) * 120,
                y: y + (Math.random() - 0.5) * 120,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            };

            const el = document.createElement("div");

            el.style.position = "absolute";
            el.style.width = "14px";
            el.style.height = "14px";
            el.style.borderRadius = "50%";
            el.style.background = "cyan";
            el.style.boxShadow = "0 0 10px cyan";

            document.getElementById("w0").appendChild(el);

            niroWorld.npcs[id] = {
                npc,
                el
            };

            console.log("NPC SPAWNED:", id);
        }
        // 🔁 AI LOOP
        function niroThinkLoop() {
            niroAI.think();
            requestAnimationFrame(niroThinkLoop);
        }
        niroThinkLoop();
        /* =========================
           NIRO OBJECT SYSTEM (FIXED)
        ========================= */

        const niroWorld = {
            objects: {}
        };
        niroWorld.npcs = {};

        function niroCreate(input = "") {
            function niroSpawnNPC() {

                const id = "npc_" + Date.now();

                const npc = {
                    x: x + (Math.random() - 0.5) * 100,
                    y: y + (Math.random() - 0.5) * 100,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2
                };

                const el = document.createElement("div");

                el.style.position = "absolute";
                el.style.width = "14px";
                el.style.height = "14px";
                el.style.borderRadius = "50%";
                el.style.background = "cyan";
                el.style.boxShadow = "0 0 12px cyan";

                document.getElementById("w0").appendChild(el);

                niroWorld.npcs[id] = {
                    npc,
                    el
                };

                console.log("NPC SPAWNED:", id);
            }
            const id = "obj_" + Date.now();

            const p = {
                x: x + (Math.random() - 0.5) * 150,
                y: y + (Math.random() - 0.5) * 150,
                w: 40 + Math.random() * 60,
                h: 40 + Math.random() * 60,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3,
                color: `hsl(${Math.random()*360},80%,60%)`
            };

            const el = document.createElement("div");

            el.style.position = "absolute";
            el.style.width = p.w + "px";
            el.style.height = p.h + "px";
            el.style.background = p.color;
            el.style.left = p.x + "px";
            el.style.top = p.y + "px";
            el.style.borderRadius = "10px";
            el.style.boxShadow = "0 0 10px rgba(255,255,255,0.2)";

            document.getElementById("w0").appendChild(el);

            niroWorld.objects[id] = {
                p,
                el
            };

            // 🔥 DEBUG: confirm it spawned
            console.log("NIRO CREATED:", id)
        }

        function niroBuildRoom() {

            const baseX = x + (Math.random() - 0.5) * 200;
            const baseY = y + (Math.random() - 0.5) * 200;

            const size = 120 + Math.random() * 120;
            const wallThickness = 10;

            function wall(px, py, w, h) {
                const el = document.createElement("div");
                el.style.position = "absolute";
                el.style.left = px + "px";
                el.style.top = py + "px";
                el.style.width = w + "px";
                el.style.height = h + "px";
                el.style.background = "#222";
                el.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
                document.getElementById("w0").appendChild(el);
            }

            function floor(px, py, w, h) {
                const el = document.createElement("div");
                el.style.position = "absolute";
                el.style.left = px + "px";
                el.style.top = py + "px";
                el.style.width = w + "px";
                el.style.height = h + "px";
                el.style.background = "#444";
                el.style.opacity = 0.6;
                document.getElementById("w0").appendChild(el);
            }

            // floor
            floor(baseX, baseY, size, size);

            // walls
            wall(baseX, baseY, size, wallThickness);
            wall(baseX, baseY + size, size, wallThickness);
            wall(baseX, baseY, wallThickness, size);
            wall(baseX + size, baseY, wallThickness, size);

            console.log("NIRO BUILT ROOM");
        }
        // movement loop for objects
        function updateObjects() {
            for (const id in niroWorld.npcs) {
                const n = niroWorld.npcs[id].npc;
                const el = niroWorld.npcs[id].el;

                n.x += n.vx;
                n.y += n.vy;

                if (n.x < 0 || n.x > WORLD_SIZE) n.vx *= -1;
                if (n.y < 0 || n.y > WORLD_SIZE) n.vy *= -1;

                el.style.left = n.x + "px";
                el.style.top = n.y + "px";
            }
            for (const id in niroWorld.objects) {
                const obj = niroWorld.objects[id];
                const p = obj.p;

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > WORLD_SIZE) p.vx *= -1;
                if (p.y < 0 || p.y > WORLD_SIZE) p.vy *= -1;

                obj.el.style.left = p.x + "px";
                obj.el.style.top = p.y + "px";
            }

            requestAnimationFrame(updateObjects);
        }
        updateObjects();
    </script>
</body>

</html>
